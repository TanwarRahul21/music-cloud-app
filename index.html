<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ===== Design Tokens ===== */
    :root {
      --bg: #0b0b0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #f4f4f7;
      --text-muted: #9a9aac;
      --accent: #8b5cf6;
      --accent-soft: rgba(139, 92, 246, 0.12);
      --radius-card: 12px;
      --radius-row: 8px;
      --font-main: "DM Sans", sans-serif;
      --font-mono: "SFMono-Regular", "Consolas", "Menlo", monospace;
      --player-h: 92px;
      --sidebar-w: 220px;
      --topbar-h: 64px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
    }

    body {
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
      color: inherit;
    }

    /* ===== App Layout ===== */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
      width: 100%;
      height: 100vh;
      background: var(--bg);
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--bg);
      padding: 16px 12px;
      overflow-y: auto;
      position: relative;
      z-index: 20;
    }

    .main-shell {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      padding-bottom: var(--player-h);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .content {
      overflow-y: auto;
      padding: 24px 20px 36px;
    }

    .section {
      margin-bottom: 32px;
    }

    .section h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 12px;
    }

    .meta {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 400;
    }

    /* ===== Sidebar ===== */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px 14px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }

    .brand-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .nav {
      display: grid;
      gap: 4px;
      margin-bottom: 16px;
    }

    .nav-btn {
      height: 36px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      transition: background-color 180ms ease, color 180ms ease, border-color 180ms ease;
      text-align: left;
    }

    .nav-btn svg {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
    }

    .nav-btn:hover {
      background: #151521;
      color: var(--text);
    }

    .nav-btn.active {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: rgba(139, 92, 246, 0.26);
    }

    .sidebar-title {
      margin: 14px 8px 8px;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .playlist-list {
      display: grid;
      gap: 6px;
    }

    .playlist-item {
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      width: 100%;
      padding: 6px;
      text-align: left;
      cursor: pointer;
      transition: background-color 180ms ease, border-color 180ms ease;
    }

    .playlist-item:hover {
      background: #151521;
      border-color: var(--border);
    }

    .playlist-thumb {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #1a1a28;
      position: relative;
      overflow: hidden;
    }

    .playlist-thumb::before,
    .playlist-thumb::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 999px;
      opacity: 0.45;
      background: #2d2d3f;
    }

    .playlist-thumb::before {
      width: 18px;
      height: 18px;
      left: 4px;
      bottom: 4px;
    }

    .playlist-thumb::after {
      width: 13px;
      height: 13px;
      right: 5px;
      top: 6px;
      background: #404058;
    }

    .playlist-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .playlist-count {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ===== Topbar ===== */
    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mobile-menu-btn,
    .icon-btn,
    .control-btn,
    .like-btn {
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      min-width: 32px;
      min-height: 32px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background-color 180ms ease, color 180ms ease, border-color 180ms ease;
      padding: 0;
    }

    .mobile-menu-btn svg,
    .icon-btn svg,
    .control-btn svg,
    .like-btn svg {
      width: 16px;
      height: 16px;
    }

    .mobile-menu-btn:hover,
    .icon-btn:hover,
    .control-btn:hover,
    .like-btn:hover {
      background: #171723;
      border-color: var(--border);
      color: var(--text);
    }

    .search-wrap {
      min-width: 160px;
      width: min(380px, 46vw);
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 0 14px 0 34px;
      font-size: 14px;
      outline: none;
      transition: border-color 180ms ease;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-muted);
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #252536;
      display: grid;
      place-items: center;
      color: #d7d7e0;
      font-size: 12px;
      font-weight: 600;
    }

    .mobile-menu-btn {
      display: none;
    }

    /* ===== Home View ===== */
    .greeting {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin: 0 0 20px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .quick-card {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius-card);
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 8px;
      cursor: pointer;
      transition: background-color 180ms ease, transform 180ms ease;
      min-height: 68px;
    }

    .quick-card:hover {
      background: #171723;
      transform: translateY(-2px);
    }

    .art {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #1a1a28;
      position: relative;
      overflow: hidden;
    }

    .art::before {
      content: "";
      position: absolute;
      width: 68%;
      height: 68%;
      left: 16%;
      top: 16%;
      border-radius: 999px;
      border: 2px solid #2e2e45;
    }

    .art::after {
      content: "";
      position: absolute;
      width: 9px;
      height: 9px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: #454562;
    }

    .quick-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .album-card {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius-card);
      padding: 10px;
      cursor: pointer;
      transition: background-color 180ms ease, transform 180ms ease;
    }

    .album-card:hover {
      background: #171723;
      transform: translateY(-2px);
    }

    .album-art {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #191925;
      aspect-ratio: 1 / 1;
      position: relative;
      overflow: hidden;
    }

    .album-art .play-overlay {
      position: absolute;
      right: 8px;
      bottom: 8px;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: #ffffff;
      color: #12121a;
      display: grid;
      place-items: center;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .album-card:hover .play-overlay {
      opacity: 1;
      transform: translateY(0);
    }

    .album-title {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .album-sub {
      margin-top: 2px;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== Track List ===== */
    .tracks {
      display: grid;
      gap: 2px;
    }

    .track-row {
      display: grid;
      grid-template-columns: 30px 42px minmax(0, 1fr) 28px 40px;
      align-items: center;
      gap: 10px;
      height: 56px;
      border-radius: var(--radius-row);
      padding: 0 8px;
      cursor: pointer;
      transition: background-color 160ms ease;
    }

    .track-row:hover {
      background: #151521;
    }

    .track-index {
      width: 22px;
      position: relative;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      font-family: var(--font-mono);
    }

    .track-number,
    .track-index .row-play {
      transition: opacity 150ms ease;
      display: block;
    }

    .track-index .row-play {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 14px;
      height: 14px;
      opacity: 0;
    }

    .track-row:hover .track-number {
      opacity: 0;
    }

    .track-row:hover .track-index .row-play {
      opacity: 1;
      color: #d4d4df;
    }

    .track-row.active {
      background: rgba(139, 92, 246, 0.1);
    }

    .track-art {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #1a1a28;
      position: relative;
      overflow: hidden;
    }

    .track-art::before {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 7px;
      height: 2px;
      background: #3c3c56;
    }

    .track-art::after {
      content: "";
      position: absolute;
      left: 10px;
      top: 9px;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 2px solid #32324b;
    }

    .track-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-like {
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .track-row:hover .row-like,
    .track-row.active .row-like {
      opacity: 1;
    }

    .duration {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
    }

    /* ===== Library Empty State ===== */
    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .library-empty {
      min-height: calc(100vh - var(--topbar-h) - var(--player-h) - 120px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      border: 1px dashed transparent;
    }

    .library-icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 14px;
      color: #b1b1bf;
    }

    .library-empty h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .library-empty p {
      margin: 8px 0 16px;
      font-size: 14px;
      color: var(--text-muted);
      max-width: 420px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .btn-primary,
    .btn-ghost {
      height: 36px;
      border-radius: 20px;
      border: 1px solid transparent;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 180ms ease, border-color 180ms ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #7a4fe0;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }

    .btn-ghost:hover {
      background: #151521;
    }

    .upload-zone {
      width: min(560px, 100%);
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: var(--surface);
      padding: 18px;
      font-size: 13px;
      color: var(--text-muted);
      transition: border-color 180ms ease;
    }

    .upload-zone:hover {
      border-color: var(--accent);
    }

    /* ===== Bottom Player ===== */
    .player {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--player-h);
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(420px, 1.4fr) minmax(180px, 1fr);
      align-items: center;
      padding: 10px 16px;
      gap: 12px;
      z-index: 30;
    }

    .player-left,
    .player-center,
    .player-right {
      min-width: 0;
      display: flex;
      align-items: center;
    }

    .player-left {
      gap: 10px;
    }

    .player-art {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #1a1a28;
      position: relative;
      overflow: hidden;
      flex: 0 0 40px;
    }

    .player-art::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 2px solid #32324b;
      top: 8px;
      left: 8px;
    }

    .player-meta {
      min-width: 0;
    }

    .player-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-artist {
      margin-top: 2px;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-center {
      flex-direction: column;
      gap: 8px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .control-btn.active,
    .like-btn.active {
      color: var(--accent);
    }

    .play-main {
      width: 36px;
      height: 36px;
      min-width: 36px;
      min-height: 36px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: #ffffff;
      color: #12121a;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background-color 180ms ease;
      padding: 0;
    }

    .play-main:hover {
      background: #ececf1;
    }

    .play-main svg {
      width: 16px;
      height: 16px;
    }

    .progress-wrap {
      width: min(540px, 100%);
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) 36px;
      align-items: center;
      gap: 8px;
    }

    .time {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }

    .progress-bar,
    .volume-bar {
      position: relative;
      height: 3px;
      border-radius: 999px;
      background: #2c2c3d;
      cursor: pointer;
      transition: height 180ms ease;
    }

    .progress-bar:hover {
      height: 5px;
    }

    .progress-fill,
    .volume-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      border-radius: inherit;
      background: #f5f5f8;
    }

    .volume-fill {
      background: var(--accent);
    }

    .progress-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ffffff;
      opacity: 0;
      transition: opacity 150ms ease;
      pointer-events: none;
    }

    .progress-bar:hover .progress-thumb,
    .progress-bar.dragging .progress-thumb {
      opacity: 1;
    }

    .player-right {
      justify-content: flex-end;
      gap: 6px;
    }

    .volume-wrap {
      width: 80px;
      display: flex;
      align-items: center;
    }

    /* ===== Mobile Sidebar Overlay ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 18;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== Responsive ===== */
    @media (max-width: 1180px) {
      .card-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .quick-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .player {
        grid-template-columns: minmax(0, 1fr) minmax(330px, 1.2fr) minmax(130px, 0.8fr);
      }
    }

    @media (max-width: 920px) {
      .card-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .quick-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .player-right {
        gap: 2px;
      }
    }

    @media (max-width: 720px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: var(--sidebar-w);
        transform: translateX(-100%);
        transition: transform 180ms ease;
        border-right: 1px solid var(--border);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .mobile-menu-btn {
        display: grid;
      }

      .content {
        padding: 20px 14px 24px;
      }

      .topbar {
        padding: 0 12px;
      }

      .search-wrap {
        width: min(300px, 54vw);
      }

      .card-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .player {
        grid-template-columns: minmax(0, 1fr);
        height: 120px;
        padding: 8px 10px;
        gap: 6px;
      }

      .main-shell {
        padding-bottom: 120px;
      }

      .player-left,
      .player-center {
        width: 100%;
      }

      .player-right {
        display: none;
      }

      .progress-wrap {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .greeting {
        font-size: 24px;
      }

      .quick-grid,
      .card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .track-row {
        grid-template-columns: 24px 36px minmax(0, 1fr) 24px 30px;
        padding: 0 4px;
        gap: 8px;
      }

      .time {
        display: none;
      }

      .progress-wrap {
        grid-template-columns: minmax(0, 1fr);
      }

      .search-wrap {
        width: min(220px, 58vw);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l11-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="17" cy="16" r="3"></circle>
          </svg>
        </div>
        <div class="brand-name">Music Cloud</div>
      </div>

      <nav class="nav" id="sidebarNav">
        <button class="nav-btn active" data-view="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"></path>
          </svg>
          Home
        </button>
        <button class="nav-btn" data-view="browse">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M21 21l-4.3-4.3"></path>
          </svg>
          Browse
        </button>
        <button class="nav-btn" data-view="library">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16v16H4z"></path>
            <path d="M8 8h8"></path>
            <path d="M8 12h8"></path>
            <path d="M8 16h5"></path>
          </svg>
          Library
        </button>
        <button class="nav-btn" data-view="liked">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 21s-7-4.4-9-8.9C1.4 8 3.5 4.8 7 4.8c2 0 3.2 1 4 2.2.8-1.2 2-2.2 4-2.2 3.5 0 5.6 3.2 4 7.3-2 4.5-7 8.9-7 8.9z"></path>
          </svg>
          Liked Songs
        </button>
      </nav>

      <div class="sidebar-title">Playlists</div>
      <div class="playlist-list" id="playlistList"></div>
    </aside>

    <div class="main-shell">
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <path d="M4 7h16"></path>
              <path d="M4 12h16"></path>
              <path d="M4 17h16"></path>
            </svg>
          </button>
          <button class="icon-btn" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 18l-6-6 6-6"></path>
            </svg>
          </button>
          <button class="icon-btn" aria-label="Forward">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 6l6 6-6 6"></path>
            </svg>
          </button>
        </div>

        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M21 21l-4.3-4.3"></path>
          </svg>
          <input type="text" placeholder="Search tracks, artists, playlists" aria-label="Search" />
        </div>

        <div class="topbar-right">
          <div class="avatar" aria-label="User avatar">RC</div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="content">
        <section class="view active" id="homeView">
          <h1 class="greeting" id="greetingText">Good evening</h1>

          <div class="section">
            <h2>Quick picks</h2>
            <div class="quick-grid" id="quickGrid"></div>
          </div>

          <div class="section">
            <h2>Recently played</h2>
            <div class="card-grid" id="recentGrid"></div>
          </div>

          <div class="section">
            <h2>Top tracks</h2>
            <div class="tracks" id="topTracks"></div>
          </div>
        </section>

        <section class="view" id="libraryView">
          <div class="library-empty">
            <div>
              <svg class="library-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M9 18V5l11-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="17" cy="16" r="3"></circle>
              </svg>
              <h3>Your library is empty</h3>
              <p>Create playlists, save tracks you love, or upload your own audio to build a personal collection.</p>
              <div class="btn-row">
                <button class="btn-primary" type="button">Create a playlist</button>
                <button class="btn-ghost" type="button">Browse music</button>
              </div>
              <div class="upload-zone" id="uploadZone">
                Drag and drop music files here or click to browse.
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="overlay" id="sidebarOverlay"></div>

  <!-- Bottom Player -->
  <footer class="player">
    <div class="player-left">
      <div class="player-art" id="playerArt" aria-hidden="true"></div>
      <div class="player-meta">
        <div class="player-title" id="playerTitle">Select a track</div>
        <div class="player-artist" id="playerArtist">Artist</div>
      </div>
      <button class="like-btn" id="playerLikeBtn" aria-label="Like track"></button>
    </div>

    <div class="player-center">
      <div class="control-row">
        <button class="control-btn" id="shuffleBtn" aria-label="Shuffle"></button>
        <button class="control-btn" id="prevBtn" aria-label="Previous"></button>
        <button class="play-main" id="playPauseBtn" aria-label="Play or pause"></button>
        <button class="control-btn" id="nextBtn" aria-label="Next"></button>
        <button class="control-btn" id="repeatBtn" aria-label="Repeat"></button>
      </div>
      <div class="progress-wrap">
        <div class="time" id="elapsedText">0:00</div>
        <div class="progress-bar" id="progressBar" aria-label="Seek">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <div class="time" id="totalText">0:00</div>
      </div>
    </div>

    <div class="player-right">
      <button class="control-btn" id="queueBtn" aria-label="Queue"></button>
      <button class="control-btn" id="muteBtn" aria-label="Mute"></button>
      <div class="volume-wrap">
        <div class="volume-bar" id="volumeBar" aria-label="Volume">
          <div class="volume-fill" id="volumeFill"></div>
        </div>
      </div>
    </div>
  </footer>

  <script>
    /* ===== Data ===== */
    const tracks = [
      { title: "Night Drive", artist: "Ari Lo", duration: "3:42", artTone: "#1f1f31" },
      { title: "Mosaic Room", artist: "The Juniper Club", duration: "4:05", artTone: "#24243a" },
      { title: "Open Circuit", artist: "Nova Spring", duration: "2:58", artTone: "#1c1c2d" },
      { title: "Static Bloom", artist: "Mile Zero", duration: "3:16", artTone: "#27273f" },
      { title: "Paper Planes", artist: "Luna North", duration: "3:51", artTone: "#202035" },
      { title: "Afterglow", artist: "Kite Theory", duration: "4:14", artTone: "#292944" },
      { title: "Blue Signal", artist: "Echo Harbor", duration: "3:03", artTone: "#1b1b2b" },
      { title: "Velvet Keys", artist: "Dawn Department", duration: "2:49", artTone: "#25253b" }
    ];

    const playlists = [
      { name: "Focus Blend", count: 32 },
      { name: "Late Studio", count: 18 },
      { name: "Deep House Notes", count: 44 },
      { name: "Acoustic Calm", count: 21 },
      { name: "Cloud Sessions", count: 13 }
    ];

    /* ===== Icon Templates ===== */
    const icons = {
      play: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.4v13.2a1 1 0 0 0 1.52.85l10-6.6a1 1 0 0 0 0-1.7l-10-6.6A1 1 0 0 0 8 5.4z"></path></svg>`,
      pause: `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="5" width="4" height="14" rx="1"></rect><rect x="13" y="5" width="4" height="14" rx="1"></rect></svg>`,
      heartOutline: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.4-9-8.9C1.4 8 3.5 4.8 7 4.8c2 0 3.2 1 4 2.2.8-1.2 2-2.2 4-2.2 3.5 0 5.6 3.2 4 7.3-2 4.5-7 8.9-7 8.9z"></path></svg>`,
      heartFill: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.4-9-8.9C1.4 8 3.5 4.8 7 4.8c2 0 3.2 1 4 2.2.8-1.2 2-2.2 4-2.2 3.5 0 5.6 3.2 4 7.3-2 4.5-7 8.9-7 8.9z"></path></svg>`,
      shuffle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"></path><path d="M4 20L21 3"></path><path d="M21 16v5h-5"></path><path d="M15 15l6 6"></path><path d="M4 4l5 5"></path></svg>`,
      repeat: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"></path><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><path d="M7 23l-4-4 4-4"></path><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>`,
      prev: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5v14"></path><path d="M18 6l-9 6 9 6z"></path></svg>`,
      next: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 5v14"></path><path d="M6 6l9 6-9 6z"></path></svg>`,
      queue: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h10"></path></svg>`,
      volume: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H3v6h3l5 4z"></path><path d="M15 9a4 4 0 0 1 0 6"></path><path d="M18 7a7 7 0 0 1 0 10"></path></svg>`,
      muted: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H3v6h3l5 4z"></path><path d="M22 9l-6 6"></path><path d="M16 9l6 6"></path></svg>`
    };

    /* ===== State ===== */
    const state = {
      currentTrack: 0,
      playing: false,
      shuffle: false,
      repeat: false,
      progress: 0,
      volume: 72,
      muted: false,
      previousVolume: 72,
      liked: new Set([2])
    };

    /* ===== Element References ===== */
    const sidebar = document.getElementById("sidebar");
    const sidebarOverlay = document.getElementById("sidebarOverlay");
    const mobileMenuBtn = document.getElementById("mobileMenuBtn");
    const sidebarNav = document.getElementById("sidebarNav");

    const playlistList = document.getElementById("playlistList");
    const greetingText = document.getElementById("greetingText");
    const quickGrid = document.getElementById("quickGrid");
    const recentGrid = document.getElementById("recentGrid");
    const topTracks = document.getElementById("topTracks");

    const homeView = document.getElementById("homeView");
    const libraryView = document.getElementById("libraryView");

    const playerTitle = document.getElementById("playerTitle");
    const playerArtist = document.getElementById("playerArtist");
    const playerArt = document.getElementById("playerArt");
    const playerLikeBtn = document.getElementById("playerLikeBtn");

    const shuffleBtn = document.getElementById("shuffleBtn");
    const prevBtn = document.getElementById("prevBtn");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const nextBtn = document.getElementById("nextBtn");
    const repeatBtn = document.getElementById("repeatBtn");
    const queueBtn = document.getElementById("queueBtn");
    const muteBtn = document.getElementById("muteBtn");

    const progressBar = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");
    const progressThumb = document.getElementById("progressThumb");
    const elapsedText = document.getElementById("elapsedText");
    const totalText = document.getElementById("totalText");

    const volumeBar = document.getElementById("volumeBar");
    const volumeFill = document.getElementById("volumeFill");

    /* ===== Render Functions ===== */
    function setGreeting() {
      const hour = new Date().getHours();
      if (hour < 12) greetingText.textContent = "Good morning";
      else if (hour < 18) greetingText.textContent = "Good afternoon";
      else greetingText.textContent = "Good evening";
    }

    function renderPlaylists() {
      playlistList.innerHTML = playlists
        .map((item) => `
          <button class="playlist-item" type="button">
            <span class="playlist-thumb" aria-hidden="true"></span>
            <span>
              <span class="playlist-name">${item.name}</span>
              <span class="playlist-count">${item.count} tracks</span>
            </span>
          </button>
        `)
        .join("");
    }

    function renderQuickGrid() {
      quickGrid.innerHTML = tracks.slice(0, 6).map((track, i) => `
        <button class="quick-card" type="button" data-track="${i}">
          <span class="art" aria-hidden="true"></span>
          <span class="quick-title">${track.title}</span>
        </button>
      `).join("");
    }

    function renderRecentGrid() {
      recentGrid.innerHTML = tracks.map((track, i) => `
        <button class="album-card" type="button" data-track="${i}">
          <span class="album-art" aria-hidden="true">
            <span class="play-overlay">${icons.play}</span>
          </span>
          <div class="album-title">${track.title}</div>
          <div class="album-sub">${track.artist}</div>
        </button>
      `).join("");
    }

    function renderTopTracks() {
      topTracks.innerHTML = tracks.map((track, i) => `
        <div class="track-row ${state.currentTrack === i ? "active" : ""}" data-track="${i}" role="button" tabindex="0" aria-label="Play ${track.title}">
          <div class="track-index">
            <span class="track-number">${String(i + 1).padStart(2, "0")}</span>
            <span class="row-play">${icons.play}</span>
          </div>
          <div class="track-art" aria-hidden="true"></div>
          <div>
            <div class="track-title">${track.title}</div>
            <div class="track-artist">${track.artist}</div>
          </div>
          <button class="like-btn row-like ${state.liked.has(i) ? "active" : ""}" data-like-track="${i}" aria-label="Like ${track.title}">
            ${state.liked.has(i) ? icons.heartFill : icons.heartOutline}
          </button>
          <div class="duration">${track.duration}</div>
        </div>
      `).join("");
    }

    function applyPlayerIcons() {
      shuffleBtn.innerHTML = icons.shuffle;
      prevBtn.innerHTML = icons.prev;
      nextBtn.innerHTML = icons.next;
      repeatBtn.innerHTML = icons.repeat;
      queueBtn.innerHTML = icons.queue;
      muteBtn.innerHTML = state.muted ? icons.muted : icons.volume;
      playPauseBtn.innerHTML = state.playing ? icons.pause : icons.play;
      playerLikeBtn.innerHTML = state.liked.has(state.currentTrack) ? icons.heartFill : icons.heartOutline;
    }

    function updatePlayerMeta() {
      const current = tracks[state.currentTrack];
      playerTitle.textContent = current.title;
      playerArtist.textContent = current.artist;
      playerArt.style.background = current.artTone;
      totalText.textContent = current.duration;
      playerLikeBtn.classList.toggle("active", state.liked.has(state.currentTrack));
    }

    function updateProgressUI() {
      const pct = Math.max(0, Math.min(100, state.progress));
      progressFill.style.width = `${pct}%`;
      progressThumb.style.left = `${pct}%`;

      const total = durationToSeconds(tracks[state.currentTrack].duration);
      const elapsed = Math.round((pct / 100) * total);
      elapsedText.textContent = secondsToLabel(elapsed);
    }

    function updateVolumeUI() {
      const fillValue = state.muted ? 0 : state.volume;
      volumeFill.style.width = `${fillValue}%`;
      muteBtn.innerHTML = state.muted ? icons.muted : icons.volume;
    }

    /* ===== Utility ===== */
    function durationToSeconds(label) {
      const [m, s] = label.split(":").map(Number);
      return m * 60 + s;
    }

    function secondsToLabel(seconds) {
      const m = Math.floor(seconds / 60);
      const s = String(seconds % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function percentFromPointer(event, element) {
      const rect = element.getBoundingClientRect();
      const x = event.clientX - rect.left;
      return Math.max(0, Math.min(100, (x / rect.width) * 100));
    }

    /* ===== Player Actions ===== */
    function setCurrentTrack(index) {
      state.currentTrack = index;
      state.progress = 0;
      updatePlayerMeta();
      updateProgressUI();
      renderTopTracks();
      applyPlayerIcons();
    }

    function togglePlay() {
      state.playing = !state.playing;
      playPauseBtn.innerHTML = state.playing ? icons.pause : icons.play;
    }

    function stepTrack(direction) {
      if (state.shuffle) {
        state.currentTrack = Math.floor(Math.random() * tracks.length);
      } else {
        const next = state.currentTrack + direction;
        state.currentTrack = (next + tracks.length) % tracks.length;
      }
      state.progress = 0;
      updatePlayerMeta();
      updateProgressUI();
      renderTopTracks();
      applyPlayerIcons();
    }

    function toggleLike(index = state.currentTrack) {
      if (state.liked.has(index)) state.liked.delete(index);
      else state.liked.add(index);
      updatePlayerMeta();
      renderTopTracks();
      applyPlayerIcons();
    }

    /* ===== Interactions ===== */
    function bindContentClicks() {
      document.addEventListener("click", (event) => {
        const rowLike = event.target.closest("[data-like-track]");
        if (rowLike) {
          event.stopPropagation();
          toggleLike(Number(rowLike.dataset.likeTrack));
          return;
        }

        const card = event.target.closest("[data-track]");
        if (card) {
          setCurrentTrack(Number(card.dataset.track));
          state.playing = true;
          applyPlayerIcons();
        }
      });

      topTracks.addEventListener("keydown", (event) => {
        const row = event.target.closest(".track-row");
        if (!row) return;
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          setCurrentTrack(Number(row.dataset.track));
          state.playing = true;
          applyPlayerIcons();
        }
      });
    }

    function bindPlayerControls() {
      playPauseBtn.addEventListener("click", togglePlay);
      prevBtn.addEventListener("click", () => stepTrack(-1));
      nextBtn.addEventListener("click", () => stepTrack(1));

      shuffleBtn.addEventListener("click", () => {
        state.shuffle = !state.shuffle;
        shuffleBtn.classList.toggle("active", state.shuffle);
      });

      repeatBtn.addEventListener("click", () => {
        state.repeat = !state.repeat;
        repeatBtn.classList.toggle("active", state.repeat);
      });

      playerLikeBtn.addEventListener("click", () => toggleLike(state.currentTrack));

      muteBtn.addEventListener("click", () => {
        if (state.muted) {
          state.muted = false;
          state.volume = state.previousVolume || 72;
        } else {
          state.muted = true;
          state.previousVolume = state.volume;
        }
        updateVolumeUI();
      });

      progressBar.addEventListener("click", (event) => {
        state.progress = percentFromPointer(event, progressBar);
        updateProgressUI();
      });

      volumeBar.addEventListener("click", (event) => {
        state.volume = percentFromPointer(event, volumeBar);
        state.muted = state.volume === 0;
        if (!state.muted) state.previousVolume = state.volume;
        updateVolumeUI();
      });

      let dragging = false;
      progressBar.addEventListener("pointerdown", (event) => {
        dragging = true;
        progressBar.classList.add("dragging");
        state.progress = percentFromPointer(event, progressBar);
        updateProgressUI();
      });

      window.addEventListener("pointermove", (event) => {
        if (!dragging) return;
        state.progress = percentFromPointer(event, progressBar);
        updateProgressUI();
      });

      window.addEventListener("pointerup", () => {
        dragging = false;
        progressBar.classList.remove("dragging");
      });
    }

    function bindNavigation() {
      sidebarNav.addEventListener("click", (event) => {
        const button = event.target.closest(".nav-btn");
        if (!button) return;

        [...sidebarNav.querySelectorAll(".nav-btn")].forEach((el) => el.classList.remove("active"));
        button.classList.add("active");

        const view = button.dataset.view;
        const showLibrary = view === "library";
        homeView.classList.toggle("active", !showLibrary);
        libraryView.classList.toggle("active", showLibrary);

        if (window.innerWidth <= 720) {
          sidebar.classList.remove("open");
          sidebarOverlay.classList.remove("show");
        }
      });
    }

    function bindMobileMenu() {
      mobileMenuBtn.addEventListener("click", () => {
        const isOpen = sidebar.classList.toggle("open");
        sidebarOverlay.classList.toggle("show", isOpen);
      });

      sidebarOverlay.addEventListener("click", () => {
        sidebar.classList.remove("open");
        sidebarOverlay.classList.remove("show");
      });

      window.addEventListener("resize", () => {
        if (window.innerWidth > 720) {
          sidebar.classList.remove("open");
          sidebarOverlay.classList.remove("show");
        }
      });
    }

    /* ===== Initialize ===== */
    function init() {
      setGreeting();
      renderPlaylists();
      renderQuickGrid();
      renderRecentGrid();
      renderTopTracks();
      applyPlayerIcons();
      updatePlayerMeta();
      updateProgressUI();
      updateVolumeUI();

      bindContentClicks();
      bindPlayerControls();
      bindNavigation();
      bindMobileMenu();
    }

    init();
  </script>
</body>
</html>
