<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Cloud</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%231db954'/%3E%3Cpath d='M24 40V18l22-4v22' stroke='%230b2d12' stroke-width='4' fill='none'/%3E%3Ccircle cx='20' cy='42' r='6' fill='%230b2d12'/%3E%3Ccircle cx='42' cy='38' r='6' fill='%230b2d12'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar__left">
        <div class="brand">
          <div class="brand__logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8" fill="currentColor"></polygon></svg>
          </div>
          <div class="brand__text">
            <h1 class="brand__title">Music Cloud</h1>
          </div>
        </div>
      </div>

      <div class="topbar__center">
        <input id="searchInput" class="input input--search" type="search" placeholder="What do you want to play?" aria-label="Search songs">
      </div>

      <div class="topbar__right">
        <span class="user-email" id="userEmail">Guest</span>
        <button class="btn btn--ghost" id="logoutBtn" type="button">Logout</button>
      </div>
    </header>

    <main class="layout">
      <section class="card library-panel" aria-label="Library">
        <div class="card__header">
          <div>
            <h2 class="card__title">Your Library</h2>
            <div class="card__meta" id="libraryMeta">0 songs</div>
          </div>
          <div class="card__actions">
            <label class="btn btn--primary" id="uploadBtnLabel" for="fileInput">Add songs</label>
            <input id="fileInput" class="sr-only" type="file" accept="audio/*" multiple>
          </div>
        </div>

        <div class="upload-feedback hidden" id="uploadFeedback" aria-live="polite">
          <div class="upload-feedback__text" id="uploadStatusText">Uploading song...</div>
          <div class="upload-feedback__bar">
            <div class="upload-feedback__fill" id="uploadProgressFill"></div>
          </div>
        </div>

        <div class="dropzone" id="dropzone" tabindex="0">
          <div class="dropzone__icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          </div>
          <div class="dropzone__title">Drop audio files here</div>
          <div class="dropzone__subtitle">or click Add songs</div>
        </div>

        <div class="list" id="trackList" role="list"></div>

        <div class="playlist-panel">
          <div class="playlist__header">
            <div>
              <h3 class="playlist__title">Playlists</h3>
              <p class="playlist__subtitle">Organize your favorites</p>
            </div>
            <div class="playlist__new">
              <input id="playlistNameInput" class="input" type="text" placeholder="New playlist">
              <button class="btn btn--primary" id="playlistCreateBtn" type="button">Create</button>
            </div>
          </div>
          <div class="playlist__list" id="playlistList"></div>
        </div>
      </section>

      <section class="card player-panel" aria-label="Player">
        <div class="player__top">
          <div class="player__art album-art-placeholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
          </div>
          <div class="player__now">
            <div class="player__label">Now Playing</div>
            <div class="player__title" id="nowTitle">Nothing yet</div>
            <div class="player__sub" id="nowSub">Add a song to start</div>
          </div>
        </div>

        <div class="player__controls-wrapper">
          <div class="player__controls">
            <button class="iconbtn" id="prevBtn" type="button" aria-label="Previous">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
            </button>
            <button class="playbtn" id="playBtn" type="button" aria-label="Play/Pause">▶</button>
            <button class="iconbtn" id="nextBtn" type="button" aria-label="Next">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
            </button>
          </div>

          <div class="player__progress">
            <div class="time" id="timeCurrent">0:00</div>
            <input id="seek" class="range" type="range" min="0" max="100" value="0" step="0.1">
            <div class="time" id="timeDuration">0:00</div>
          </div>
        </div>

        <div class="player__bottom">
          <div class="vol">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="var(--text-sec)" stroke-width="2" fill="none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            <input id="volume" class="range" type="range" min="0" max="1" value="1" step="0.01">
          </div>
          <button class="btn btn--danger" id="clearAllBtn" type="button">Clear library</button>
        </div>

        <audio id="audio" preload="metadata"></audio>
      </section>
    </main>
  </div>

  <div class="modal" id="authModal" aria-hidden="true">
    <div class="modal__backdrop" id="authBackdrop"></div>
    <div class="modal__dialog">
      <div class="modal__header">
        <h3 class="modal__title">Welcome back</h3>
        <button class="modal__close" id="authCloseBtn" aria-label="Close">×</button>
      </div>

      <div class="modal__body">
        <div class="modal__oauth">
          <button class="btn btn--ghost" id="googleLoginBtn" type="button">Continue with Google</button>
        </div>

        <label class="input__label" for="authEmail">Email</label>
        <input class="input" id="authEmail" type="email" placeholder="you@example.com">

        <label class="input__label" for="authPassword">Password</label>
        <input class="input" id="authPassword" type="password" placeholder="••••••••">

        <div class="modal__actions">
          <button class="btn btn--primary" id="loginBtn" type="button">Login</button>
          <button class="btn btn--primary" id="signupBtn" type="button">Sign up</button>
        </div>

        <div class="modal__divider" role="separator" aria-label="Or"></div>

        <label class="input__label" for="phoneInput">Phone number</label>
        <input class="input" id="phoneInput" type="tel" placeholder="+1 555 555 5555" autocomplete="tel">
        <button class="btn btn--primary" id="sendOtpBtn" type="button">Send OTP</button>

        <label class="input__label" for="otpInput">OTP code</label>
        <input class="input" id="otpInput" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="123456">
        <button class="btn btn--primary" id="verifyOtpBtn" type="button">Verify OTP</button>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
